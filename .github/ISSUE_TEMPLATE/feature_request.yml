name: Feature request
description: Suggest an idea or improvement for sofka
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the workflow or situation where sofka falls short today.
      placeholder: When I'm watching pods across several namespaces, I can't...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like sofka to do? Keybindings, commands, config options — sketch it however you like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've worked around this, or how k9s / other tools handle it.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, links — anything that helps.
    validations:
      required: false
